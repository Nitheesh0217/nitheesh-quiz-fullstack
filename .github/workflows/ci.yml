name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: concentrate-portal

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Start postgres + redis
        run: docker compose up -d postgres redis

      - name: Wait for postgres + redis to be healthy
        run: sleep 10

      # .env.test is gitignored (contains local secrets), so CI writes its
      # own throwaway copy pointed at the docker-compose postgres/redis
      # ports (5433/6379) — these are ephemeral CI-only credentials, not
      # real secrets.
      - name: Write .env.test for CI
        run: |
          cat > .env.test <<'EOF'
          NODE_ENV=test
          PORT=4001
          DATABASE_URL=postgres://postgres:postgres@localhost:5433/concentrate-quiz-test
          REDIS_URL=redis://localhost:6379
          JWT_SECRET=ci-test-jwt-secret-please-replace-me-with-64-chars-000000000000
          JWT_REFRESH_SECRET=ci-test-refresh-secret-please-replace-me-64-chars-0000000000000
          JWT_ACCESS_TTL=15m
          JWT_REFRESH_TTL=7d
          COOKIE_SECRET=ci-test-cookie-secret-please-replace-me-16-chars
          EOF

      - name: Create test database
        run: |
          PGPASSWORD=postgres psql -h localhost -p 5433 -U postgres -c "CREATE DATABASE \"concentrate-quiz-test\";"

      - name: Run migrations against test database
        run: npm run db:migrate:test

      - name: Run tests with coverage (100% threshold enforced by vitest.config.ts)
        run: npm run coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Stop postgres + redis
        if: always()
        run: docker compose down

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Start full stack
        run: |
          cat > .env <<EOF
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          COOKIE_SECRET=${{ secrets.COOKIE_SECRET }}
          EOF
          docker compose up -d

      - name: Wait for app to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "App is up"
              exit 0
            fi
            echo "Waiting for app..."
            sleep 2
          done
          echo "App did not become healthy in time" >&2
          exit 1

      - name: Install Playwright browsers
        if: hashFiles('playwright.config.ts') != ''
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        if: hashFiles('playwright.config.ts') != ''
        run: npx playwright test

      - name: Upload Playwright report
        if: always() && hashFiles('playwright.config.ts') != ''
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Stop full stack
        if: always()
        run: docker compose down

# Required GitHub Secrets (Settings -> Secrets and variables -> Actions -> New repository secret):
# DOCKERHUB_USERNAME  - your Docker Hub username
# DOCKERHUB_TOKEN     - Docker Hub access token (not your password)
#                       Create at: hub.docker.com -> Account Settings -> Security -> New Access Token
# JWT_SECRET          - production JWT signing secret, 32+ chars (used by the e2e job to boot the stack)
# JWT_REFRESH_SECRET  - production JWT refresh-token secret, 32+ chars
# COOKIE_SECRET       - production cookie signing secret, 16+ chars
#
# Note: the Playwright steps above are still guarded with
# hashFiles('playwright.config.ts') so the job degrades gracefully if that
# file (or the e2e/ specs) are ever removed - not because they're missing
# today, they aren't.
